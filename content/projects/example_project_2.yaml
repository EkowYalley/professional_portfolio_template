title: "Project Me vs You"

short_summary: >
  This is a project I made at a recent hackathon in the category of games. 
  I used the turtle library to create a game inspired by snake but it was a two player game. 
  The game was called me vs you and the goal was to eat the food and grow your snake while trying to avoid colliding with the other snake. 
  The game was a lot of fun to make and play and I learned a lot about how to use the turtle library to create games.

tech_stack:
  - Python
  - Turtle
  - Time
  - Random 

problem_statement: >
  The problem was to create an engaging two-player snake game using the turtle library in Python.

approach: >
  I built the game step by step, starting with simple snake movement and then adding a second player.
  I kept the code organized by putting movement and reset behavior into separate functions like move_snake and reset_snake.
  I also used Git to track changes and tested the game carefully to make sure collisions and boundaries work correctly.

results_impact: >
  The final result is a working two-player snake game made with Turtle.
  I improved the game by replacing hardcoded settings with variables so it is easier to adjust difficulty.
  The cleaner reset logic also fixed crashes when both snakes collided, making the game more stable and fun to play.

