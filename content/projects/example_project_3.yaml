title: "AWS "

short_summary: >
  The goal of this project was to explore AWS by picking a stackholder question and then using different Aws services like Atena and S3 as well as 
  sagemaker to answer the question. 

tech_stack:
  - sklearn
  - Python
  - AWS Sagemaker
  - io

problem_statement: >
  Compare sagemaker to regular sklearn to figure out which machine learning model was more accurate in predicting how long it took
  for the city departments to resolve complaints.

approach: >
  The approach was to first use Athena to create a binary classification of the data set in order to predict whether a complaint would be resolved in less than 3 days or not. 
  Then I used sagemaker to train a machine learning model on the data set and then I used sklearn to train a machine learning model on the same data set. 
  Finally I compared the results of the two models to see which one was more accurate.

results_impact: >
  The results showed that the sagemaker model was more accurate than the sklearn model in predicting how long it took for the city departments to resolve complaints.
  This insight will help inform future machine learning projects and guide the selection of appropriate tools for different use cases.


