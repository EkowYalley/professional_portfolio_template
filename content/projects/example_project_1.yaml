title: "Project Sql"

short_summary: >
  Built a model to identify the best nap locations on MSU's campus based
  on sunlight exposure, foot traffic, grass quality, and proximity to
  food smells. Findings have been peer-reviewed by three other dogs and
  were described as "life-changing" and "very good."

tech_stack:
  - Python
  - os
  - SQL
  - Pandas
  - Matplotlib
  - sqlalchemy
  - Jupyter Notebooks

problem_statement: >
  For this SQL project I had to work with the Actors database to figure out some insightson the data base.
  I answered various questions about the data base and I had to use different SQL commands to get the answers, like which actor
  generates the most revenue by agregating data bases.

approach: >
  My approach involved designing and implementing SQL queries to extract and analyze data from the Actors database.
   I focused on understanding the relationships between different entities in the database and used aggregate functions to compute key metrics.


results_impact: >
  The results provided valuable insights into the performance of different actors and helped identify key revenue drivers.
  The results also showed what drove sales at the store and what actors were the most popular. This information can be used to make
   informed decisions about marketing strategies and inventory management, for the manager of of the video store.

